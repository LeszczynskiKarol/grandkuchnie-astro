name: Build & Deploy grandkuchnie.pl

# repository_dispatch (publish) — z panelu meblowe-portfolio po „Publikuj";
# workflow_dispatch — recznie; push do main — zmiany kodu.
on:
  repository_dispatch:
    types: [publish]
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"

concurrency:
  group: deploy-grandkuchnie
  cancel-in-progress: true

env:
  S3_BUCKET: www.grandkuchnie.pl
  CF_DIST_WWW: E3BHDI3E6KXQAJ
  CF_DIST_APEX: E25AZA6J9B19PK
  AWS_REGION: eu-central-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Sync do S3
        run: |
          aws s3 sync dist/ "s3://${S3_BUCKET}/" --delete --size-only             --cache-control "public, max-age=31536000, immutable"             --exclude "*.html" --exclude "robots.txt" --exclude "sitemap*.xml"
          aws s3 sync dist/ "s3://${S3_BUCKET}/"             --cache-control "public, max-age=0, must-revalidate"             --exclude "*" --include "*.html" --include "robots.txt" --include "sitemap*.xml"
      - name: Inwalidacja CloudFront (www + apex)
        run: |
          aws cloudfront create-invalidation --distribution-id "$CF_DIST_WWW" --paths "/*" --query "Invalidation.Status" --output text
          aws cloudfront create-invalidation --distribution-id "$CF_DIST_APEX" --paths "/*" --query "Invalidation.Status" --output text
